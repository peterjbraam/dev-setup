[window]
padding = { x = 6, y = 6 }
opacity = 1.0
option_as_alt = "Both"

[scrolling]
history = 10000

[font]
size = 14.0

[font.normal]
family = "Menlo"

[colors.primary]
background = "#111111"
foreground = "#e8e8e8"
dim_foreground = "#a8a8a8"

[colors.selection]
text = "CellBackground"
background = "#c7925b"

[colors.bright]
black = "#808080"
white = "#ffffff"

[colors.normal]
black = "#111111"
white = "#d8d8d8"

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Block", blinking = "Off" }

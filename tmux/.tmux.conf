# ---------------------------------------------------------
# Peter's Minimal Emacs-Vibe Tmux Config
# ---------------------------------------------------------

# 1. Force Emacs keybindings in the command line and copy mode
set -g status-keys emacs
setw -g mode-keys emacs

# 2. Start window numbers at 1 (0 is too far away on the keyboard)
set -g base-index 1
setw -g pane-base-index 1

# 3. Native OS Clipboard Integration (OSC 52 Magic)
# This allows tmux to securely blast copied text straight to your Mac OS clipboard
# through Alacritty, even if tmux is running inside an SSH or VM session!
set -s set-clipboard on

# ---------------------------------------------------------
# Window Management (No Prefix Required - Just hold Alt)
# ---------------------------------------------------------

# Alt-t to open a new window (like a browser tab)
bind -n M-t new-window

# Alt-x to close the current window (killed instantly)
bind -n M-x kill-window

# Alt-1 through Alt-5 to jump directly to specific windows
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Alt-\ (backslash) to toggle to the Most Recently Used window.
# (Note: Alt-Tab is usually intercepted by the Mac/Linux OS window manager, 
# so Alt-\ is the safest, fastest alternative for bouncing between two windows).
bind -n M-\\ last-window
# ---------------------------------------------------------
# 1-Chord Yank of Last Command Output (Alt-c)
# ---------------------------------------------------------
bind -n M-c copy-mode \; \
    send-keys -X previous-prompt \; \
    send-keys -X previous-prompt \; \
    send-keys -X cursor-down \; \
    send-keys -X begin-selection \; \
    send-keys -X next-prompt \; \
    send-keys -X cursor-up \; \
    send-keys -X copy-selection-and-cancel
# ---------------------------------------------------------
# Native Shift-Arrow Selection (Emacs shift-select-mode)
# ---------------------------------------------------------
bind -T copy-mode S-Up    if-shell -F "#{selection_present}" "send-keys -X cursor-up"    "send-keys -X begin-selection; send-keys -X cursor-up"
bind -T copy-mode S-Down  if-shell -F "#{selection_present}" "send-keys -X cursor-down"  "send-keys -X begin-selection; send-keys -X cursor-down"
bind -T copy-mode S-Left  if-shell -F "#{selection_present}" "send-keys -X cursor-left"  "send-keys -X begin-selection; send-keys -X cursor-left"
bind -T copy-mode S-Right if-shell -F "#{selection_present}" "send-keys -X cursor-right" "send-keys -X begin-selection; send-keys -X cursor-right"

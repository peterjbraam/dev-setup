# --- General
set -g mouse on
set -g history-limit 200000
set -s escape-time 10
set -g default-terminal "screen-256color"

# --- Keep prefix default (C-b) to avoid Emacs collisions
# (don’t remap to C-a or C-x)

# --- Pane navigation (hjkl)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# --- Resize with Shift-HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Split panes
bind | split-window -h
bind - split-window -v

# --- Statusline
set -g status-interval 5
set -g status-left "#[bold]#S"
set -g status-right "%Y-%m-%d %H:%M"

# --- Clipboard integration (OSC52)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy || xclip -sel clip || wl-copy || cat >/dev/null"
